<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="images/logo.png" type="image/png">
<title>Contact | Ralph</title>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<link rel="stylesheet" href="css/contact.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
<nav class="navbar">

<div class="logo">
<img class="logo-img" src="images/logo.png" alt="Logo">
</div>

<ul class="nav-links">
<li><a href="projects.html">Projects</a></li>
<li><a href="certifications.html">Certifications</a></li>
<li><a href="index.html">Home</a></li>
</ul>

</nav>
</header>

<section class="contact">

<div class="contact-container">

<h1>Contact <span class="gradient-text">Me</span></h1>

<p class="contact-subtext">
Have a project idea or just want to connect? Send me a message.
</p>

<form class="contact-form" id="contact-form" action="https://api.staticforms.xyz/submit" method="POST">

<input type="hidden" name="accessKey" value="sf_b92851e779cf066068b0cf47">

<!-- Honeypot -->
<input type="text" name="honeypot" style="display:none">

<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" placeholder="Your Message" required></textarea>

<!-- 🔒 reCAPTCHA -->
<div class="g-recaptcha" data-sitekey="6Lce5SQtAAAAAJ9Oi5dBK_ZKAHApWyjmCYX2BEFv"></div>

<button type="submit" class="btn primary">Send Message!</button>

<p id="form-status"></p>

</form>

</div>
<script>
const form = document.getElementById("contact-form");
const status = document.getElementById("form-status");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  // 1️⃣ Check CAPTCHA
  const captchaResponse = grecaptcha.getResponse();
  if (!captchaResponse || captchaResponse.length === 0) {
    status.textContent = "Please complete the CAPTCHA before sending your message.";
    return; // stop submission
  }

  // 2️⃣ Send the form via fetch
  const data = new FormData(form);

  try {
    const res = await fetch(form.action, { method: "POST", body: data });
    if (!res.ok) throw new Error("Network error");

    status.textContent = "Message sent successfully! 🔥";
    form.reset();
    grecaptcha.reset(); // reset CAPTCHA for next submission
  } catch (error) {
    status.textContent = "Something went wrong 😢";
  }
});
</script>
</section>

<footer>
<p>© 2026 Ralph</p>
</footer>

</body>
</html>
